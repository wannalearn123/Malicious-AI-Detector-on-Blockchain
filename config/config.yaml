# Blockchain Configuration
blockchain:
  ethereum:
    rpc_url: "${ETH_RPC_URL}"
    ws_url: "${ETH_WS_URL}"
    chain_id: 1
    start_block: 18000000
  polygon:
    rpc_url: "${POLYGON_RPC_URL}"
    chain_id: 137
    
# Data Configuration
data:
  elliptic_pp_path: "data/external/elliptic_pp"
  raw_traces_path: "data/raw/evm_traces"
  processed_path: "data/processed"
  cache_path: "data/cache"
  
# Feature Engineering
features:
  opcode_categories:
    arithmetic: ["ADD", "MUL", "SUB", "DIV", "SDIV", "SMOD", "MOD", "ADDMOD", "MULMOD", "EXP", "SIGNEXTEND"]
    comparison: ["LT", "GT", "SLT", "SGT", "EQ", "ISZERO"]
    bitwise: ["AND", "OR", "XOR", "NOT", "BYTE", "SHL", "SHR", "SAR"]
    memory: ["SHA3", "ADDRESS", "BALANCE", "ORIGIN", "CALLER", "CALLVALUE", "CALLDATALOAD", "CALLDATASIZE", "CALLDATACOPY", "CODESIZE", "CODECOPY", "GASPRICE", "EXTCODESIZE", "EXTCODECOPY", "RETURNDATASIZE", "RETURNDATACOPY", "EXTCODEHASH", "BLOCKHASH", "COINBASE", "TIMESTAMP", "NUMBER", "DIFFICULTY", "GASLIMIT", "CHAINID", "SELFBALANCE", "BASEFEE"]
    storage: ["POP", "MLOAD", "MSTORE", "MSTORE8", "SLOAD", "SSTORE", "MSIZE", "GAS", "JUMPDEST", "PC", "MSIZE", "GAS"]
    flow: ["STOP", "ADDMOD", "MULMOD", "EXP", "SIGNEXTEND", "LT", "GT", "SLT", "SGT", "EQ", "ISZERO", "AND", "OR", "XOR", "NOT", "BYTE", "SHL", "SHR", "SAR", "ADDRESS", "BALANCE", "ORIGIN", "CALLER", "CALLVALUE", "CALLDATALOAD", "CALLDATASIZE", "CALLDATACOPY", "CODESIZE", "CODECOPY", "GASPRICE", "EXTCODESIZE", "EXTCODECOPY", "RETURNDATASIZE", "RETURNDATACOPY", "EXTCODEHASH", "BLOCKHASH", "COINBASE", "TIMESTAMP", "NUMBER", "DIFFICULTY", "GASLIMIT", "CHAINID", "SELFBALANCE", "BASEFEE", "POP", "MLOAD", "MSTORE", "MSTORE8", "SLOAD", "SSTORE", "JUMP", "JUMPI", "PC", "MSIZE", "GAS", "JUMPDEST", "PUSH1", "PUSH2", "PUSH3", "PUSH4", "PUSH5", "PUSH6", "PUSH7", "PUSH8", "PUSH9", "PUSH10", "PUSH11", "PUSH12", "PUSH13", "PUSH14", "PUSH15", "PUSH16", "PUSH17", "PUSH18", "PUSH19", "PUSH20", "PUSH21", "PUSH22", "PUSH23", "PUSH24", "PUSH25", "PUSH26", "PUSH27", "PUSH28", "PUSH29", "PUSH30", "PUSH31", "PUSH32", "DUP1", "DUP2", "DUP3", "DUP4", "DUP5", "DUP6", "DUP7", "DUP8", "DUP9", "DUP10", "DUP11", "DUP12", "DUP13", "DUP14", "DUP15", "DUP16", "SWAP1", "SWAP2", "SWAP3", "SWAP4", "SWAP5", "SWAP6", "SWAP7", "SWAP8", "SWAP9", "SWAP10", "SWAP11", "SWAP12", "SWAP13", "SWAP14", "SWAP15", "SWAP16", "LOG0", "LOG1", "LOG2", "LOG3", "LOG4", "CREATE", "CALL", "CALLCODE", "RETURN", "DELEGATECALL", "CREATE2", "STATICCALL", "REVERT", "INVALID", "SELFDESTRUCT"]
  
  temporal_window: 3600  # 1 hour in seconds
  graph_depth: 2
  
# Model Configuration
models:
  gnn:
    hidden_channels: 128
    num_layers: 2
    dropout: 0.3
    learning_rate: 0.001
    epochs: 100
    batch_size: 64
    
  isolation_forest:
    contamination: 0.05
    n_estimators: 100
    
  xgboost:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 200
    
# Detection Thresholds
detection:
  anomaly_threshold: -0.3
  risk_score_threshold: 0.7
  min_confidence: 0.85
  
# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  
# Monitoring
monitoring:
  prometheus_port: 9090
  log_level: "INFO"
EOF